# docker-compose.yml
version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPEN_METEO_URL=https://api.open-meteo.com/v1/forecast
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80" # Maps port 3000 on your machine to port 80 in the container
    depends_on:
      - backend
    restart: unless-stopped